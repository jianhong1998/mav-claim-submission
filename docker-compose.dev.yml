services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_DB: ${DATABASE_DB}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_DB}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
  server:
    image: 'jianhong1998/mav-claim-submission-backend:latest-dev'
    platform: linux/arm64
    ports:
      - '3007:3007'
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_DB: ${DATABASE_DB}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_BUILD_MODE: ${BACKEND_BUILD_MODE}
      BACKEND_CLIENT_HOST: ${BACKEND_CLIENT_HOST}
      BACKEND_COOKIE_SECRET: ${BACKEND_COOKIE_SECRET}
      BACKEND_COOKIE_DOMAIN_NAME: ${BACKEND_COOKIE_DOMAIN_NAME}
      BACKEND_TOKEN_ENCRYPTION_KEY: ${BACKEND_TOKEN_ENCRYPTION_KEY}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET}
      BACKEND_EMAIL_RECIPIENT: ${BACKEND_EMAIL_RECIPIENT}
      BACKEND_GOOGLE_CLIENT_ID: ${BACKEND_GOOGLE_CLIENT_ID}
      BACKEND_GOOGLE_CLIENT_SECRET: ${BACKEND_GOOGLE_CLIENT_SECRET}
      BACKEND_GOOGLE_REDIRECT_URI: ${BACKEND_GOOGLE_REDIRECT_URI}
      BACKEND_GOOGLE_DRIVE_CLAIMS_FOLDER_NAME: ${BACKEND_GOOGLE_DRIVE_CLAIMS_FOLDER_NAME}
      ENABLE_API_TEST_MODE: ${ENABLE_API_TEST_MODE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      db-migration-service:
        condition: service_completed_successfully
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-southeast-1}
        awslogs-group: /rpi/claim-submission-app/${NODE_ENV}/backend
        awslogs-create-group: 'true' # Auto-create group if missing
        awslogs-datetime-format: '%Y-%m-%dT%H:%M:%S.%L%z' # Optional: ISO timestamp format
        awslogs-force-flush-interval-seconds: '1'
        awslogs-max-buffered-events: '1' # force tiny batches
  db-migration-service:
    image: 'jianhong1998/mav-claim-submission-db-migration:latest-dev'
    platform: linux/arm64
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_DB: ${DATABASE_DB}
      BACKEND_PORT: ${BACKEND_PORT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    restart: on-failure:3
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-southeast-1}
        awslogs-group: /rpi/claim-submission-app/${NODE_ENV}/db-migration-service
        awslogs-create-group: 'true' # Auto-create group if missing
        awslogs-datetime-format: '%Y-%m-%dT%H:%M:%S.%L%z' # Optional: ISO timestamp format
        awslogs-force-flush-interval-seconds: '1'
        awslogs-max-buffered-events: '1' # force tiny batches
  client:
    image: 'jianhong1998/mav-claim-submission-frontend:latest-dev'
    platform: linux/arm64
    ports:
      - '${FRONTEND_PORT}:3000'
    environment:
      NODE_ENV: ${NODE_ENV}
      FRONTEND_PORT: ${FRONTEND_PORT}
      FRONTEND_BACKEND_BASE_URL: ${FRONTEND_BACKEND_BASE_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-southeast-1}
        awslogs-group: /rpi/claim-submission-app/${NODE_ENV}/frontend
        awslogs-create-group: 'true' # Auto-create group if missing
        awslogs-datetime-format: '%Y-%m-%dT%H:%M:%S.%L%z' # Optional: ISO timestamp format
        awslogs-force-flush-interval-seconds: '1'
        awslogs-max-buffered-events: '1' # force tiny batches

volumes:
  postgres_data:

networks:
  iokg844ogck04sc48gk0ksoo:
    name: iokg844ogck04sc48gk0ksoo
    external: true

configs:

secrets:
